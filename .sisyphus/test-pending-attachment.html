<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileAttachment Pending Test</title>
    <style>
        :root {
            --border-default: #e2e8f0;
            --surface-elevated: #ffffff;
            --surface-overlay: #f1f5f9;
            --text-primary: #1e293b;
            --icon-muted: #64748b;
            --icon-primary: #0f172a;
            --accent: #3b82f6;
            --focus-ring: #3b82f6;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --space-sm: 0.375rem;
            --space-md: 0.75rem;
            --radius-md: 0.375rem;
            --duration-standard: 150ms;
            --ease-out: cubic-bezier(0, 0, 0.2, 1);
        }
        
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f8fafc;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .test-container {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            width: 100%;
            max-width: 600px;
        }
        
        h2 {
            margin: 0 0 16px 0;
            color: var(--text-primary);
            font-size: 18px;
        }
        
        /* FileAttachment styles */
        .file-attachment {
            display: inline-flex;
            align-items: center;
            gap: var(--space-sm);
            max-width: 100%;
        }
        
        .compact {
            border-radius: 1.2rem;
            border: 1px solid var(--border-default);
            background-color: var(--surface-elevated);
            box-shadow: var(--shadow-sm);
            padding: var(--space-sm) var(--space-md);
        }
        
        .pending {
            border-radius: 1.2rem;
            border: 1px solid var(--border-default);
            background-color: var(--surface-elevated);
            box-shadow: var(--shadow-sm);
            padding: var(--space-sm) var(--space-md);
            animation: borderPulse 2s ease-in-out infinite;
        }
        
        @keyframes borderPulse {
            0%, 100% {
                border-color: var(--border-default);
            }
            50% {
                border-color: color-mix(in srgb, var(--accent) 30%, var(--border-default) 70%);
            }
        }
        
        .file-icon {
            flex-shrink: 0;
            color: var(--icon-muted);
        }
        
        .filename {
            font-family: 'Nimbus Sans L', sans-serif;
            font-size: 0.875rem;
            line-height: 1.25;
            color: var(--text-primary);
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .remove-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            min-width: 44px;
            min-height: 44px;
            padding: 0;
            margin: -8px;
            background-color: transparent;
            border: none;
            border-radius: var(--radius-md);
            color: var(--icon-muted);
            cursor: pointer;
            transition: color var(--duration-standard) var(--ease-out),
                        background-color var(--duration-standard) var(--ease-out),
                        transform var(--duration-standard) var(--ease-out);
            outline: none;
        }
        
        .remove-button:hover {
            color: var(--icon-primary);
            background-color: color-mix(in srgb, var(--surface-overlay) 50%, transparent);
        }
        
        .remove-button:focus-visible {
            box-shadow: 0 0 0 2px var(--focus-ring);
        }
        
        .remove-button:active {
            transform: scale(0.92);
        }
        
        /* Container styling matching MessageInput */
        .attachments-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 4px 16px 8px 16px;
        }
        
        .message-composer {
            border: 1px solid var(--border-default);
            border-radius: 1.25rem;
            background: white;
            min-height: 78px;
            display: flex;
            flex-direction: column;
        }
        
        .composer-textarea {
            min-height: 60px;
            width: 100%;
            resize: none;
            border: 0;
            background: transparent;
            padding: 8px 16px;
            font-size: 14px;
            font-family: Georgia, serif;
            color: var(--text-primary);
            outline: none;
        }
        
        .label {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h2>FileAttachment Component - Pending Variant</h2>
        <div class="label">Used in MessageInput.svelte for pending attachments</div>
        
        <div class="message-composer">
            <textarea class="composer-textarea" placeholder="Type a message..."></textarea>
            
            <div class="attachments-container">
                <!-- FileAttachment with pending variant -->
                <div class="file-attachment pending" role="listitem">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="file-icon">
                        <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"></path>
                        <path d="M14 2v4a2 2 0 0 0 2 2h4"></path>
                        <path d="M10 9H8"></path>
                        <path d="M16 13H8"></path>
                        <path d="M16 17H8"></path>
                    </svg>
                    <span class="filename">document.pdf</span>
                    <button type="button" class="remove-button" aria-label="Remove document.pdf">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 6 6 18"></path>
                            <path d="m6 6 12 12"></path>
                        </svg>
                    </button>
                </div>
                
                <!-- Another pending attachment -->
                <div class="file-attachment pending" role="listitem">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="file-icon">
                        <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"></path>
                        <path d="M14 2v4a2 2 0 0 0 2 2h4"></path>
                        <path d="M10 9H8"></path>
                        <path d="M16 13H8"></path>
                        <path d="M16 17H8"></path>
                    </svg>
                    <span class="filename">image.png</span>
                    <button type="button" class="remove-button" aria-label="Remove image.png">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 6 6 18"></path>
                            <path d="m6 6 12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="test-container">
        <h2>Compact Variant (for comparison)</h2>
        <div class="attachments-container">
            <div class="file-attachment compact" role="listitem">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="file-icon">
                    <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"></path>
                    <path d="M14 2v4a2 2 0 0 0 2 2h4"></path>
                    <path d="M10 9H8"></path>
                    <path d="M16 13H8"></path>
                    <path d="M16 17H8"></path>
                </svg>
                <span class="filename">completed-upload.pdf</span>
                <button type="button" class="remove-button" aria-label="Remove completed-upload.pdf">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 6 6 18"></path>
                        <path d="m6 6 12 12"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
